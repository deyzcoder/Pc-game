<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ультимативный 3D ПК в Сборе 🎮</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #030305; font-family: sans-serif; }
        @media screen and (orientation: portrait) {
            body::before {
                content: "🔄 Поверни телефон горизонтально!";
                position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                background: #050508; color: #00ff88;
                display: flex; align-items: center; justify-content: center;
                font-size: 22px; font-weight: bold; z-index: 9999; text-align: center;
            }
        }
        .ui-panel {
            position: absolute; top: 15px; left: 15px;
            background: rgba(10, 10, 15, 0.9); backdrop-filter: blur(15px);
            padding: 15px; border-radius: 12px;
            border: 1px solid #00ff88; color: white; z-index: 10;
            max-width: 280px; box-shadow: 0 0 25px rgba(0, 255, 136, 0.3);
            pointer-events: none;
        }
        h3 { margin: 0 0 5px 0; color: #00ff88; font-size: 16px; }
        p { margin: 0; font-size: 12px; color: #a1a1aa; }
    </style>
</head>
<body>

    <div class="ui-panel">
        <h3>БЕЛАЯ СБОРКА МЕЧТЫ 🚀</h3>
        <p>Код сам нарисовал текстуры для NZXT, ASUS ROG, Ryzen 9 и RTX 5090! Защита CORS побеждена. Крути корпус пальцем!</p>
    </div>

    <!-- Загружаем 3D-движок из памяти телефона -->
    <script src="three.min.js"></script>
    
    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020204);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 4, 8); 
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const pcGroup = new THREE.Group();
        scene.add(pcGroup);

        // --- ГЕНЕРАТОР ТЕКСТУР КОДОМ (Чтобы обойти блокировки картинок) ---
        function createNoiseTexture(type) {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');

            if (type === 'board') {
                ctx.fillStyle = '#1e1f29'; ctx.fillRect(0,0,512,512);
                ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 2;
                for(let i=0; i<20; i++) { // Рисуем белые дорожки ASUS ROG платы
                    ctx.beginPath(); ctx.moveTo(Math.random()*512, 0); ctx.lineTo(Math.random()*512, 512); ctx.stroke();
                }
            } else if (type === 'ryzen') {
                ctx.fillStyle = '#b5b8c4'; ctx.fillRect(0,0,512,512);
                ctx.fillStyle = '#000000'; ctx.font = 'bold 60px sans-serif';
                ctx.fillText('AMD RYZEN', 90, 200);
                ctx.font = '40px sans-serif'; ctx.fillText('9 9950X3D', 150, 300);
            } else if (type === 'gpu') {
                ctx.fillStyle = '#111215'; ctx.fillRect(0,0,512,512);
                ctx.fillStyle = '#00ff88'; // Светящиеся кулеры Palit GameRock
                for(let i=0; i<3; i++) {
                    ctx.beginPath(); ctx.arc(100 + i*160, 256, 60, 0, Math.PI*2); ctx.fill();
                }
            } else if (type === 'case') {
                ctx.fillStyle = 'rgba(255,255,255,0.15)'; ctx.fillRect(0,0,512,512);
                ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 4; // Рамка панорамного стекла NZXT
                ctx.strokeRect(10, 10, 492, 492);
            } else if (type === 'psu') {
                ctx.fillStyle = '#ffffff'; ctx.fillRect(0,0,512,512);
                ctx.fillStyle = '#111'; ctx.font = 'bold 50px sans-serif';
                ctx.fillText('SEASONIC', 130, 260);
            } else if (type === 'ram') {
                ctx.fillStyle = '#ffffff'; ctx.fillRect(0,0,512,512);
                ctx.fillStyle = '#00ff88'; ctx.fillRect(0, 0, 512, 40); // RGB полоска сверху плашки
            }

            const texture = new THREE.CanvasTexture(canvas);
            return texture;
        }

        // 1. БЕЛАЯ МАТЕРИНСКАЯ ПЛАТА ASUS ROG STRIX
        const matGeo = new THREE.BoxGeometry(4, 0.08, 4);
        const matMaterial = new THREE.MeshStandardMaterial({ map: createNoiseTexture('board'), roughness: 0.5 });
        const motherboard = new THREE.Mesh(matGeo, matMaterial);
        motherboard.position.set(0, -0.4, 0);
        pcGroup.add(motherboard);

        // 2. ПРОЦЕССОР AMD RYZEN 9 9950X3D
        const cpuGeo = new THREE.BoxGeometry(0.85, 0.1, 0.85);
        const cpuMaterial = new THREE.MeshStandardMaterial({ map: createNoiseTexture('ryzen'), metalness: 0.6, roughness: 0.2 });
        const ryzen9 = new THREE.Mesh(cpuGeo, cpuMaterial);
        ryzen9.position.set(0, -0.32, -0.4);
        pcGroup.add(ryzen9);

        // 3. ОПЕРАТИВНАЯ ПАМЯТЬ DDR5 (4 плашки)
        const ramGeo = new THREE.BoxGeometry(0.06, 0.38, 1.4);
        const ramMaterial = new THREE.MeshStandardMaterial({ map: createNoiseTexture('ram'), roughness: 0.2 });

        for (let i = 0; i < 4; i++) {
            const ramStick = new THREE.Mesh(ramGeo, ramMaterial);
            ramStick.position.set(0.65 + (i * 0.14), -0.18, -0.4); 
            pcGroup.add(ramStick);
        }

        // 4. ВИДЕОКАРТА NVIDIA RTX 5090 PALIT GAMEROCK
        const gpuGeo = new THREE.BoxGeometry(3.3, 0.95, 0.55);
        const gpuMaterial = new THREE.MeshStandardMaterial({ map: createNoiseTexture('gpu'), roughness: 0.3, metalness: 0.5 });
        const rtx5090 = new THREE.Mesh(gpuGeo, gpuMaterial);
        rtx5090.position.set(0, 0.1, 0.9);
        pcGroup.add(rtx5090);

        // 5. БЛОК ПИТАНИЯ SEASONIC CORE V2 WHITE
        const psuGeo = new THREE.BoxGeometry(2.5, 1.0, 3.2);
        const psuMaterial = new THREE.MeshStandardMaterial({ map: createNoiseTexture('psu'), roughness: 0.4 });
        const psu = new THREE.Mesh(psuGeo, psuMaterial);
        psu.position.set(-1.0, -1.2, -0.2);
        pcGroup.add(psu);

        // 6. ПАНОРАМНЫЙ КОРПУС NZXT H3 FLOW (Стекло)
        const caseGeo = new THREE.BoxGeometry(5.4, 4.4, 5.4);
        const caseMaterial = new THREE.MeshStandardMaterial({ map: createNoiseTexture('case'), transparent: true, opacity: 0.5, roughness: 0.1 });
        const pcCase = new THREE.Mesh(caseGeo, caseMaterial);
        pcCase.position.set(0, 0, 0);
        pcGroup.add(pcCase);

        // 7. СВЕТ
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);
        const spotLight = new THREE.DirectionalLight(0xffffff, 1.5);
        spotLight.position.set(0, 10, 5);
        scene.add(spotLight);

        // Вращение пальцем
        let isDragging = false;
        let prevX;
        window.addEventListener('touchstart', (e) => { isDragging = true; prevX = e.touches.clientX; });
        window.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            let deltaX = e.touches.clientX - prevX;
            pcGroup.rotation.y += deltaX * 0.01;
            prevX = e.touches.clientX;
        });
        window.addEventListener('touchend', () => isDragging = false);

        function animate() {
            requestAnimationFrame(animate);
            if (!isDragging) {
                pcGroup.rotation.y += 0.003; // Авто-вращение
            }
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
