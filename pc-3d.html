<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реалистичный 3D ПК Симулятор 🎮</title>
    <style>
        body {
            margin: 0; padding: 0; overflow: hidden;
            background-color: #030305;
            font-family: 'Segoe UI', sans-serif;
        }
        @media screen and (orientation: portrait) {
            body::before {
                content: "🔄 Поверни телефон горизонтально!";
                position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                background: #050508; color: #00ff88;
                display: flex; align-items: center; justify-content: center;
                font-size: 22px; font-weight: bold; z-index: 9999; text-align: center;
            }
        }
        .ui-panel {
            position: absolute; top: 15px; left: 15px;
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(15px);
            padding: 15px; border-radius: 12px;
            border: 1px solid #00ff88; color: white; z-index: 10;
            max-width: 280px; box-shadow: 0 0 25px rgba(0, 255, 136, 0.3);
        }
        h3 { margin: 0 0 5px 0; color: #00ff88; font-size: 16px; }
        p { margin: 0 0 10px 0; font-size: 12px; color: #a1a1aa; }
        .back-link {
            display: inline-block; color: #121214; background: #00ff88;
            padding: 6px 12px; border-radius: 6px; text-decoration: none;
            font-weight: bold; font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="ui-panel">
        <h3>REALISTIC 3D GRAPHICS 🌟</h3>
        <p>Настоящие тени, отражения и металлическая текстура RTX 5090 и сокета Ryzen 9.</p>
        <a href="index.html" class="back-link">⬅️ В 2D песочницу</a>
    </div>

    <!-- Загружаем библиотеки Three.js с поддержкой фотореализма через интернет -->
    <script src="https://cloudflare.com"></script>
    <script src="https://jsdelivr.net"></script>
    
    <script>
        // 1. Инициализация сцены
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020204);
        scene.fog = new THREE.FogExp2(0x020204, 0.05); // Легкий туман для глубины пространства

        // 2. Реалистичная камера
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(3, 4, 6);

        // 3. Рендерер с поддержкой теней и кинематографичного освещения
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; // Физические тени включены!
        renderer.shadowMap.type = THREE.PCFSoftShadowMap; // Мягкие сглаженные тени
        renderer.toneMapping = THREE.ACESFilmicToneMapping; // Эффект кино-камеры
        renderer.toneMappingExposure = 1.0;
        document.body.appendChild(renderer.domElement);

        // 4. МАТЕРИНСКАЯ ПЛАТА (Текстурированный матовый текстолит)
        const matGeo = new THREE.BoxGeometry(4, 0.1, 4);
        const matMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x111216, roughness: 0.5, metalness: 0.4
        });
        const motherboard = new THREE.Mesh(matGeo, matMaterial);
        motherboard.receiveShadow = true; // Плата принимает тени от деталей
        scene.add(motherboard);

        // Радиаторы охлаждения цепей питания вокруг процессора (черный шлифованный алюминий)
        const radGeo = new THREE.BoxGeometry(0.5, 0.4, 1.5);
        const radMat = new THREE.MeshStandardMaterial({ color: 0x0a0a0d, roughness: 0.2, metalness: 0.8 });
        const heatsink = new THREE.Mesh(radGeo, radMat);
        heatsink.position.set(-1.1, 0.2, -0.5);
        heatsink.castShadow = true; heatsink.receiveShadow = true;
        scene.add(heatsink);

        // 5. ПРОЦЕССОР RYZEN 9 С МЕТАЛЛИЧЕСКОЙ КРЫШКОЙ
        const cpuGeo = new THREE.BoxGeometry(0.8, 0.1, 0.8);
        const cpuMat = new THREE.MeshStandardMaterial({ 
            color: 0xcccccc, roughness: 0.15, metalness: 0.95 // Идеальный зеркальный металл
        });
        const ryzen9 = new THREE.Mesh(cpuGeo, cpuMat);
        ryzen9.position.set(0, 0.06, -0.5);
        ryzen9.castShadow = true;
        scene.add(ryzen9);

        // Текстурный пластиковый сокет AM5
        const socketGeo = new THREE.BoxGeometry(1.2, 0.04, 1.2);
        const socketMat = new THREE.MeshStandardMaterial({ color: 0x222226, roughness: 0.7 });
        const socket = new THREE.Mesh(socketGeo, socketMat);
        socket.position.set(0, 0.03, -0.5);
        socket.receiveShadow = true;
        scene.add(socket);

        // 6. ОГРОМНАЯ ВИДЕОКАРТА RTX 5090 (С бэкплейтом и текстурой кожуха)
        const gpuGeo = new THREE.BoxGeometry(3.2, 0.9, 0.5);
        const gpuMat = new THREE.MeshStandardMaterial({ 
            color: 0x181920, roughness: 0.3, metalness: 0.7 
        });
        const rtx5090 = new THREE.Mesh(gpuGeo, gpuMat);
        rtx5090.position.set(0, 0.5, 1.0);
        rtx5090.castShadow = true; // Видеокарта отбрасывает мощную тень
        rtx5090.receiveShadow = true;
        scene.add(rtx5090);

        // 7. СЛОТЫ ОПЕРАТИВНОЙ ПАМЯТИ DDR5
        const ramSlotGeo = new THREE.BoxGeometry(0.1, 0.2, 1.6);
        const ramSlotMat = new THREE.MeshStandardMaterial({ color: 0x09090b, roughness: 0.6 });
        for(let i=0; i<2; i++) {
            const slot = new THREE.Mesh(ramSlotGeo, ramSlotMat);
            slot.position.set(0.7 + (i * 0.2), 0.1, -0.5);
            slot.castShadow = true; slot.receiveShadow = true;
            scene.add(slot);
        }

        // 8. СТУДИЙНЫЙ СВЕТ (Как на выставках железа)
        // Основной белый прожектор сверху для реалистичных теней
        const mainLight = new THREE.DirectionalLight(0xffffff, 2.5);
        mainLight.position.set(4, 8, 4);
        mainLight.castShadow = true;
        mainLight.shadow.mapSize.width = 2048; // Высокое разрешение теней
        mainLight.shadow.mapSize.height = 2048;
        mainLight.shadow.camera.near = 0.5;
        mainLight.shadow.camera.far = 25;
        mainLight.shadow.bias = -0.0005;
        scene.add(mainLight);

        // Подсветка снизу (отражение от стола)
        const fillLight = new THREE.DirectionalLight(0x111525, 1.0);
        fillLight.position.set(-4, -4, -4);
        scene.add(fillLight);

        // Геймерский неоновый кастом-свет (ARGB лента)
        const rgbLight = new THREE.PointLight(0x00ff88, 3, 8);
        rgbLight.position.set(0, 1.2, 0.2);
        rgbLight.castShadow = true;
        scene.add(rgbLight);

        // 9. Настройка OrbitControls
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.05; // Не даем камере заглянуть под плату

        // 10. Игровой цикл рендеринга
        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            // Эффект плавного изменения цвета подсветки внутри корпуса (RGB перелив)
            const time = Date.now() * 0.001;
            rgbLight.color.setHSL((time * 0.1) % 1.0, 1.0, 0.5);

            renderer.render(scene, camera);
        }
        
        animate();

        // Адаптивность под размеры экрана смартфона
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
